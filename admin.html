<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>Admin - Harpreet Communications</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Outfit', sans-serif; padding: 25px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; border: 1px solid #334155; margin-bottom: 20px; }
        .actions { display: flex; gap: 10px; }
        
        .btn-call-1 { background: #22c55e; color: #fff; border: none; padding: 12px 20px; font-weight: 800; border-radius: 10px; cursor: pointer; }
        .btn-call-2 { background: #f97316; color: #fff; border: none; padding: 12px 20px; font-weight: 800; border-radius: 10px; cursor: pointer; }
        .btn-repeat { background: transparent; color: #38bdf8; border: 2px solid #38bdf8; padding: 12px 20px; font-weight: 800; border-radius: 10px; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 20px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
        .token-badge { background: #38bdf8; color: #000; padding: 5px 12px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Admin Dashboard</h1>
        <input type="date" id="date-filter" onchange="renderList()" style="padding: 10px; border-radius: 8px; border: 1px solid #38bdf8; background: #0f172a; color: white;">
        <div class="actions">
            <button class="btn-repeat" onclick="repeatCall()"><i class="fas fa-redo"></i> REPEAT BELL</button>
            <button class="btn-call-1" onclick="callNext(1)"><i class="fas fa-bullhorn"></i> CALL C-1</button>
            <button class="btn-call-2" onclick="callNext(2)"><i class="fas fa-bullhorn"></i> CALL C-2</button>
        </div>
    </div>

    <table>
        <thead><tr><th>Token</th><th>Phone</th><th>Service</th><th>Time</th></tr></thead>
        <tbody id="table-body"></tbody>
    </table>

    <script>
        // ⚠️ APNI FIREBASE CONFIG ETHE PEST KARO ⚠️
        const firebaseConfig = {
            apiKey: "AIzaSyB99ASne_eF42O-6tSUllfh7c-aEndEGyA",
  authDomain: "harpreet-token.firebaseapp.com",
  projectId: "harpreet-token",
  storageBucket: "harpreet-token.firebasestorage.app",
  messagingSenderId: "231999739276",
  appId: "1:231999739276:web:59ce294d61ec699d14f2a9",
  measurementId: "G-B8EQP35XLP"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let allAppts = [];

        window.onload = () => {
            let today = new Date().toISOString().split('T')[0];
            document.getElementById('date-filter').value = today;
        };

        db.ref('queue').on('value', (snap) => {
            let data = snap.val(); allAppts = [];
            for(let key in data) allAppts.push({id: key, ...data[key]});
            renderList();
        });

        function renderList() {
            let dateVal = document.getElementById('date-filter').value;
            if(!dateVal) return;
            let selDate = dateVal.split('-').reverse().join('-');
            
            let tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            let filtered = allAppts.filter(a => a.date === selDate).sort((a,b) => a.number - b.number);
            filtered.forEach(a => {
                tbody.innerHTML += `<tr><td><span class="token-badge">${a.number.toString().padStart(2, '0')}</span></td><td>${a.phone}</td><td>${a.service}</td><td>${a.time}</td></tr>`;
            });
        }

        // ⚠️ ਬਿਨਾਂ ਇੰਟਰਨੈੱਟ ਵਾਲੀ 100% ਪੱਕੀ ਘੰਟੀ (ਕੰਪਿਊਟਰ ਦੇ ਅੰਦਰੋਂ)
        function playDing() {
            try {
                let context = new (window.AudioContext || window.webkitAudioContext)();
                let osc = context.createOscillator();
                let gain = context.createGain();
                
                osc.connect(gain);
                gain.connect(context.destination);
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, context.currentTime); // ਪ੍ਰੋਫੈਸ਼ਨਲ ਬੈਂਕ ਵਾਲੀ ਟੋਨ
                
                gain.gain.setValueAtTime(1, context.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.6); // ਆਵਾਜ਼ ਦੀ ਗੂੰਜ
                
                osc.start(context.currentTime);
                osc.stop(context.currentTime + 0.6);
            } catch(e) {
                console.log("Audio Error", e);
            }
        }

        function callNext(counterNum) {
            let dateVal = document.getElementById('date-filter').value;
            let selDate = dateVal.split('-').reverse().join('-');
            let filtered = allAppts.filter(a => a.date === selDate).sort((a,b) => a.number - b.number);
            
            if(filtered.length > 0) {
                let next = filtered[0];
                next.counter = counterNum; 
                
                db.ref('queue/' + next.id).remove();
                db.ref('current_serving').set(next); 
                
                localStorage.setItem('currentlyServingToken', JSON.stringify(next));
                
                // ਬਟਨ ਦਬਾਉਂਦਿਆਂ ਹੀ ਲੈਪਟਾਪ/ਕੰਪਿਊਟਰ 'ਚੋਂ ਘੰਟੀ ਵੱਜੇਗੀ
                playDing();
            } else {
                alert("ਕੋਈ ਟੋਕਨ ਬਾਕੀ ਨਹੀਂ ਹੈ!");
            }
        }

        function repeatCall() {
            let cur = JSON.parse(localStorage.getItem('currentlyServingToken'));
            if(cur) {
                // ਰਿਪੀਟ ਬਟਨ ਦਬਾਉਣ 'ਤੇ ਵੀ ਘੰਟੀ ਵੱਜੇਗੀ
                playDing();
            } else {
                alert("ਪਹਿਲਾਂ ਕੋਈ ਟੋਕਨ ਬੁਲਾਓ!");
            }
        }
    </script>
</body>
</html>
