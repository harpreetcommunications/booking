<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>TV Display - Harpreet Communications</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Outfit', sans-serif; text-align: center; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; transition: 0.3s; }
        .display-card { background: rgba(255,255,255,0.05); padding: 40px 60px; border-radius: 40px; border: 4px solid #38bdf8; width: 80%; max-width: 900px; box-shadow: 0 0 60px rgba(56, 189, 248, 0.3); position: relative; }
        h1 { color: #38bdf8; font-size: 3.5rem; margin: 0; text-transform: uppercase; letter-spacing: 2px;}
        .subtitle { color: #cbd5e1; font-size: 2rem; margin-top: 10px; font-weight: 600; }
        
        #now-serving-token { font-size: 20rem; font-weight: 800; color: #fbbf24; margin: -10px 0; line-height: 1; text-shadow: 0 0 50px rgba(251, 191, 36, 0.5); transition: 0.2s;}
        
        #counter-name { font-size: 4.5rem; color: #f97316; font-weight: 800; margin-top: 10px; background: rgba(249, 115, 22, 0.1); display: inline-block; padding: 10px 40px; border-radius: 20px; border: 2px solid #f97316; }
        
        #service-name { font-size: 2.5rem; color: #22c55e; font-weight: bold; margin-top: 20px; }
        .status-box { position: absolute; bottom: 20px; right: 30px; display: flex; align-items: center; gap: 10px; font-size: 1.2rem; color: #94a3b8; font-weight: bold; }
        .dot { width: 15px; height: 15px; border-radius: 50%; background: #ef4444; box-shadow: 0 0 10px rgba(239,68,68,0.5); }
        .footer { position: absolute; bottom: 20px; left: 30px; color: #64748b; font-size: 1.2rem; letter-spacing: 1px;}
        .pop-animation { transform: scale(1.1); color: #fff !important; text-shadow: 0 0 100px #fff !important; }

        /* ਆਵਾਜ਼ ਐਕਟਿਵ ਕਰਨ ਲਈ ਨਵੀਂ ਸਕ੍ਰੀਨ */
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .start-btn { background: #38bdf8; color: #000; font-size: 3rem; font-weight: 800; padding: 30px 60px; border: none; border-radius: 30px; cursor: pointer; box-shadow: 0 0 40px rgba(56, 189, 248, 0.5); transition: 0.3s; }
        .start-btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <!-- ਘੰਟੀ ਦੀ ਆਵਾਜ਼ -->
    <audio id="bell-sound" src="https://actions.google.com/sounds/v1/doors/elevator_ding.ogg" preload="auto"></audio>

    <div id="start-overlay">
        <h2 style="color:white; margin-bottom: 20px; font-size: 2.5rem;">Harpreet Communications</h2>
        <button class="start-btn" onclick="startSystem()">▶ START TV</button>
        <p style="color:#94a3b8; margin-top: 20px; font-size:1.5rem;">(ਇਹ ਬਟਨ ਦਬਾਉਣ ਨਾਲ ਟੀਵੀ ਦੀ ਘੰਟੀ ਚਾਲੂ ਹੋ ਜਾਵੇਗੀ)</p>
    </div>

    <div class="display-card">
        <h1>Harpreet Communications</h1>
        <div class="subtitle">ਹੁਣ ਵਾਰੀ ਹੈ (NOW SERVING)</div>
        <div id="now-serving-token">00</div>
        
        <div id="counter-name">ਕਾਊਂਟਰ: --</div>
        <div id="service-name">ਕਿਰਪਾ ਕਰਕੇ ਇੰਤਜ਼ਾਰ ਕਰੋ...</div>
    </div>
    
    <div class="footer">www.harpreetcommunications.com</div>
    <div class="status-box"><span id="status-text">Connecting...</span><div class="dot" id="status-dot"></div></div>

    <script>
        // 1. ਸਭ ਤੋਂ ਪਹਿਲਾਂ ਬਟਨ ਵਾਲਾ ਫੰਕਸ਼ਨ, ਤਾਂ ਜੋ ਇਹ ਹਮੇਸ਼ਾ ਚੱਲੇ
        function startSystem() {
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('bell-sound').play().catch(()=>{}); 
        }

        // 2. ⚠️ APNI FIREBASE CONFIG ETHE PEST KARO ⚠️
        const firebaseConfig = {
            apiKey: "AIzaSyB99ASne_eF42O-6tSUllfh7c-aEndEGyA",
  authDomain: "harpreet-token.firebaseapp.com",
  projectId: "harpreet-token",
  storageBucket: "harpreet-token.firebasestorage.app",
  messagingSenderId: "231999739276",
  appId: "1:231999739276:web:59ce294d61ec699d14f2a9",
  measurementId: "G-B8EQP35XLP"
        };
        
        try {
            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();
            let lastTokenSeen = "00";

            db.ref('.info/connected').on('value', function(snap) {
                let dot = document.getElementById('status-dot');
                let text = document.getElementById('status-text');
                if (snap.val() === true) {
                    dot.style.background = '#22c55e'; dot.style.boxShadow = '0 0 15px #22c55e'; text.innerText = "System LIVE";
                } else {
                    dot.style.background = '#ef4444'; dot.style.boxShadow = '0 0 15px #ef4444'; text.innerText = "Offline";
                }
            });

            db.ref('current_serving').on('value', (snapshot) => {
                let current = snapshot.val();
                if (current && current.number) {
                    let formattedToken = current.number.toString().padStart(2, '0');
                    let tokenElement = document.getElementById('now-serving-token');
                    let counterElement = document.getElementById('counter-name');
                    let serviceElement = document.getElementById('service-name');

                    if (formattedToken !== lastTokenSeen) {
                        tokenElement.innerText = formattedToken;
                        serviceElement.innerText = current.service || "Please proceed to counter";
                        
                        if(current.counter) {
                            counterElement.innerText = "ਕਾਊਂਟਰ: " + current.counter;
                            counterElement.style.color = current.counter === 1 ? "#22c55e" : "#f97316";
                            counterElement.style.borderColor = current.counter === 1 ? "#22c55e" : "#f97316";
                            counterElement.style.background = current.counter === 1 ? "rgba(34, 197, 94, 0.1)" : "rgba(249, 115, 22, 0.1)";
                        }

                        tokenElement.classList.add('pop-animation');
                        setTimeout(() => { tokenElement.classList.remove('pop-animation'); }, 600);
                        lastTokenSeen = formattedToken;

                        let bell = document.getElementById('bell-sound');
                        bell.pause();
                        bell.currentTime = 0;
                        bell.volume = 1.0;
                        bell.play().catch(e => console.log("Sound blocked by browser"));
                    }
                }
            });
        } catch (error) {
            console.error("Firebase Config Missing or Incorrect", error);
        }
    </script>
</body>
</html>
