<!DOCTYPE html>
<html lang="pa">
<head>
    <meta charset="UTF-8">
    <title>TV Display - Harpreet Communications</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body { background: #0f172a; color: white; font-family: 'Outfit', sans-serif; text-align: center; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .display-card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 40px; border: 4px solid #38bdf8; width: 90%; max-width: 1000px; box-shadow: 0 0 60px rgba(56, 189, 248, 0.2); position: relative; }
        
        h1 { color: #38bdf8; font-size: 3.5rem; margin: 0; text-transform: uppercase; letter-spacing: 2px;}
        .subtitle { color: #cbd5e1; font-size: 2rem; margin-top: 5px; font-weight: 600; margin-bottom: 20px;}
        
        /* Side by Side layout for Token & Counter */
        .grid-container { display: flex; justify-content: space-between; border-top: 2px solid #334155; border-bottom: 2px solid #334155; padding: 30px 0; margin-bottom: 20px;}
        .box { width: 50%; }
        .box-title { font-size: 2.5rem; color: #94a3b8; font-weight: bold; letter-spacing: 2px; margin-bottom: 10px;}
        
        #now-serving-token { font-size: 14rem; font-weight: 800; color: #fbbf24; line-height: 1; text-shadow: 0 0 30px rgba(251, 191, 36, 0.4); transition: 0.2s;}
        #counter-number { font-size: 14rem; font-weight: 800; color: #22c55e; line-height: 1; text-shadow: 0 0 30px rgba(34, 197, 94, 0.4); transition: 0.2s; }
        
        #service-name { font-size: 3rem; color: #38bdf8; font-weight: bold; }
        
        .status-box { position: absolute; bottom: 20px; right: 30px; display: flex; align-items: center; gap: 10px; font-size: 1.2rem; color: #94a3b8; font-weight: bold; }
        .dot { width: 15px; height: 15px; border-radius: 50%; background: #ef4444; box-shadow: 0 0 10px rgba(239,68,68,0.5); }
        .footer { position: absolute; bottom: 20px; left: 30px; color: #64748b; font-size: 1.2rem;}
        
        .pop-animation { transform: scale(1.15); color: #fff !important; text-shadow: 0 0 80px #fff !important; }
    </style>
</head>
<body>

    <div class="display-card">
        <h1>Harpreet Communications</h1>
        <div class="subtitle">ਹੁਣ ਵਾਰੀ ਹੈ (NOW SERVING)</div>
        
        <div class="grid-container">
            <div class="box" style="border-right: 2px solid #334155;">
                <div class="box-title">TOKEN</div>
                <div id="now-serving-token">00</div>
            </div>
            <div class="box">
                <div class="box-title">COUNTER</div>
                <div id="counter-number">-</div>
            </div>
        </div>

        <div id="service-name">ਕਿਰਪਾ ਕਰਕੇ ਇੰਤਜ਼ਾਰ ਕਰੋ...</div>
    </div>
    
    <div class="footer">www.harpreetcommunications.com</div>
    <div class="status-box"><span id="status-text">Connecting...</span><div class="dot" id="status-dot"></div></div>

    <script>
         // PASTE YOUR FIREBASE CONFIG HERE
        const firebaseConfig = {
  apiKey: "AIzaSyB99ASne_eF42O-6tSUllfh7c-aEndEGyA",
  authDomain: "harpreet-token.firebaseapp.com",
  projectId: "harpreet-token",
  storageBucket: "harpreet-token.firebasestorage.app",
  messagingSenderId: "231999739276",
  appId: "1:231999739276:web:59ce294d61ec699d14f2a9",
  measurementId: "G-B8EQP35XLP"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let lastTokenSeen = "00";
        let lastCounterSeen = "-";

        // Connection Check
        db.ref('.info/connected').on('value', function(snap) {
            let dot = document.getElementById('status-dot');
            let text = document.getElementById('status-text');
            if (snap.val() === true) {
                dot.style.background = '#22c55e'; dot.style.boxShadow = '0 0 15px #22c55e'; text.innerText = "System LIVE";
            } else {
                dot.style.background = '#ef4444'; dot.style.boxShadow = '0 0 15px #ef4444'; text.innerText = "Offline";
            }
        });

        // Fetch Data
        db.ref('current_serving').on('value', (snapshot) => {
            let current = snapshot.val();
            
            if (current && current.number) {
                let formattedToken = current.number.toString().padStart(2, '0');
                let counterNum = current.counter || "-";

                let tokenElement = document.getElementById('now-serving-token');
                let counterElement = document.getElementById('counter-number');
                let serviceElement = document.getElementById('service-name');

                if (formattedToken !== lastTokenSeen || counterNum !== lastCounterSeen) {
                    tokenElement.innerText = formattedToken;
                    counterElement.innerText = counterNum;
                    serviceElement.innerText = current.service;
                    
                    tokenElement.classList.add('pop-animation');
                    counterElement.classList.add('pop-animation');
                    setTimeout(() => { 
                        tokenElement.classList.remove('pop-animation'); 
                        counterElement.classList.remove('pop-animation');
                    }, 600);

                    lastTokenSeen = formattedToken;
                    lastCounterSeen = counterNum;
                }
            }
        });
    </script>
</body>
</html>
